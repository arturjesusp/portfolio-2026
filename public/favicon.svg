<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style type="text/css">
      @keyframes breathe {
        0%, 100% { 
          fill: #ffffff; 
          transform: scale(0.95);
        }
        50% { 
          fill: #000000; 
          transform: scale(1.05);
        }
      }
      .letter {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 70px;
        font-weight: bold;
        text-anchor: middle;
        dominant-baseline: central;
        transform-origin: 50px 50px;
        animation: breathe 4s infinite ease-in-out;
      }
    </style>
  </defs>
  <!-- Background to ensure visibility on both dark and light modes -->
  <rect width="100" height="100" rx="20" fill="#888888" opacity="0.4"/>
  <text x="50" y="54" class="letter">A</text>
</svg>
